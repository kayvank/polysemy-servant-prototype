name: Haskell HLint

on:
  push:
    branches: [ "main" ]
    paths:
      - '**'
      - '.github/workflows/hlint-ci.yml'

  pull_request:
    branches: [ "main" ]
    paths:
      - '**'
      - '.github/workflows/hlint-ci.yml'


jobs:
  hlint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4 # Checkout your repository's code

      - name: 'Set up HLint'
        uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.1.6'

      - name: 'Run HLint'
        uses: haskell-actions/hlint-run@v2
        with:
          path: .
          fail-on: never
        # This step can fail without stopping the workflow
